<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
		/>
		<title>weito — Train with intent. Track with precision.</title>
		<meta
			name="description"
			content="A simple, powerful gym logbook to track workouts, measure progress, and improve consistently. No distractions. Just training data that works for you."
		/>
		<link rel="icon" href="/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<meta name="theme-color" content="#f1f0ef" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="app-loader" class="loader" aria-hidden="true" data-state="visible">
			<div class="loader-track">
				<span class="loader-bar"></span>
			</div>
		</div>
		<style>
			.loader {
				position: fixed;
				inset: 0;
				width: 100%;
				height: 100%;
				display: flex;
				justify-content: center;
				z-index: 1000;
				padding-block-start: 0.4rem;
				transition: opacity 0.15s var(--ease-quad-out);
				background-color: var(--neutral-3);
				pointer-events: none;
				opacity: 0;

				&[data-state='visible'] {
					opacity: 1;
				}

				&[data-state='hidden'] {
					opacity: 0;
				}
			}

			.loader-track {
				height: 0.4rem;
				width: 4.8rem;
				border-radius: 0.2rem;
				background-color: var(--neutral-6);
				overflow: hidden;
				display: inline-flex;
				align-items: center;
				justify-content: center;
			}

			.loader-bar {
				height: 100%;
				width: 50%;
				border-radius: 0.2rem;
				background-color: var(--neutral-12);
				animation: bounce-slide 800ms infinite alternate ease-in-out;
			}

			@keyframes bounce-slide {
				0% {
					transform: translateX(-60%);
				}
				100% {
					transform: translateX(60%);
				}
			}
		</style>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
